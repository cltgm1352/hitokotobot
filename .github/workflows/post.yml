name: ヒトコトBOT 毎日投稿

on:
  schedule:
    - cron: '20 6 * * *'     # 日本時間 15:15 に投稿（UTC 6:15）
  workflow_dispatch:        # 手動で今すぐテストできるボタン

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Pythonを準備
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: 必要なツールを入れる
        run: pip install requests
      
      - name: 日常の一言を投稿する
        env:
          KAROTTER_API_KEY: ${{ secrets.KAROTTER_API_KEY }}
        run: python bot.py
